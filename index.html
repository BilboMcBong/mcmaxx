<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>McMAXX — MAXIMUM CALORIE ARENA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Luckiest+Guy&family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --red:#e60023;
    --pink:#ff2d6f;
    --yellow:#ffd200;
    --cyan:#22c1e6;
    --ink:#111;
    --paper:#fff3cf;
    --panel:#ffffff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Baloo 2',system-ui,sans-serif;font-weight:700;color:var(--ink);
    background-color:var(--paper);
    background-image:radial-gradient(circle, rgba(230,0,35,.16) 2px, transparent 2.2px);
    background-size:18px 18px;
    min-height:100vh;overflow-x:hidden;
  }
  /* comic display fonts */
  .bangers{font-family:'Bangers',cursive;letter-spacing:1.5px;font-weight:400}
  .lucky{font-family:'Luckiest Guy',cursive;font-weight:400}

  /* ---------- header + sunburst ---------- */
  header{position:relative;text-align:center;padding:46px 16px 30px;overflow:hidden}
  .sunburst{
    position:absolute;top:50%;left:50%;width:180vmax;height:180vmax;
    transform:translate(-50%,-50%);z-index:0;
    background:repeating-conic-gradient(from 0deg,
      rgba(255,210,0,.9) 0deg 9deg, rgba(255,45,111,.9) 9deg 18deg);
    animation:spin 40s linear infinite;filter:saturate(1.1);
    -webkit-mask-image:radial-gradient(circle, #000 22%, transparent 60%);
            mask-image:radial-gradient(circle, #000 22%, transparent 60%);
    opacity:.85;
  }
  @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
  header .inner{position:relative;z-index:1}
  h1.title{
    font-family:'Bangers',cursive;font-size:clamp(46px,13vw,120px);margin:0;line-height:.9;
    color:#fff;
    -webkit-text-stroke:3px var(--ink);
    text-shadow:6px 6px 0 var(--ink), 10px 10px 0 var(--red);
    transform:rotate(-3deg);
  }
  .tag{
    display:inline-block;margin-top:18px;transform:rotate(2deg);
    background:var(--ink);color:var(--yellow);font-family:'Bangers',cursive;
    font-size:clamp(14px,3.5vw,24px);padding:6px 18px;border:3px solid #fff;border-radius:6px;
    box-shadow:5px 5px 0 var(--red);
  }

  main{max-width:1120px;margin:0 auto;padding:8px 18px 90px;
    display:grid;grid-template-columns:1fr 1fr;gap:26px;position:relative;z-index:1}
  @media(max-width:860px){main{grid-template-columns:1fr}}

  /* ---------- comic panels ---------- */
  .panel{
    background:var(--panel);border:5px solid var(--ink);border-radius:10px;
    box-shadow:10px 10px 0 var(--ink);padding:20px;
  }
  .panel:first-of-type{transform:rotate(-.6deg)}
  .panel:last-of-type{transform:rotate(.5deg)}
  .banner{
    display:inline-block;font-family:'Bangers',cursive;font-size:24px;letter-spacing:1px;
    background:var(--yellow);color:var(--ink);border:4px solid var(--ink);border-radius:6px;
    padding:2px 16px;margin:-36px 0 18px;transform:rotate(-2deg);box-shadow:4px 4px 0 var(--red);
  }

  label.fld{display:block;font-size:19px;color:var(--red);margin:16px 0 5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
  input[type=text]{
    width:100%;background:#fff;border:4px solid var(--ink);color:var(--ink);
    font-family:'Baloo 2',sans-serif;font-weight:800;font-size:22px;padding:10px 14px;border-radius:8px;outline:none;
  }
  input[type=text]:focus{box-shadow:5px 5px 0 var(--cyan)}
  input[type=text]::placeholder{color:#bbb}

  /* ---------- avatar ---------- */
  .avatar-wrap{display:flex;align-items:center;gap:16px;margin-top:16px}
  .avatar-frame{
    position:relative;width:96px;height:96px;flex:0 0 auto;
    border-radius:50%;border:5px solid var(--ink);overflow:hidden;background:var(--cyan);
    box-shadow:5px 5px 0 var(--red);
  }
  .avatar-frame img{width:100%;height:100%;display:block;
    filter:contrast(1.15) saturate(1.35);}
  .reroll{
    font-family:'Bangers',cursive;font-size:18px;letter-spacing:1px;cursor:pointer;
    background:var(--cyan);color:var(--ink);border:4px solid var(--ink);padding:8px 14px;border-radius:8px;
    box-shadow:4px 4px 0 var(--ink);transition:transform .05s,box-shadow .05s;
  }
  .reroll:active{transform:translate(4px,4px);box-shadow:0 0 0 var(--ink)}

  /* ---------- menu ---------- */
  .menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-height:430px;overflow-y:auto;padding:4px 6px 4px 2px;margin-top:6px}
  @media(max-width:500px){.menu-grid{grid-template-columns:1fr}}
  .item{
    display:flex;justify-content:space-between;align-items:center;gap:8px;
    background:#fff;border:3px solid var(--ink);border-radius:8px;padding:9px 12px;cursor:pointer;
    box-shadow:3px 3px 0 var(--ink);transition:transform .06s,box-shadow .06s,background .1s;user-select:none;
  }
  .item:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}
  .item:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--ink)}
  .item.picked{background:var(--pink);color:#fff;border-color:var(--ink)}
  .item .nm{font-size:17px;line-height:1.05;font-weight:700}
  .item .kc{font-size:15px;font-weight:800;white-space:nowrap;background:var(--yellow);color:var(--ink);border:2px solid var(--ink);border-radius:20px;padding:0 8px}
  .item.picked .kc{background:#fff}
  .item .qty{font-family:'Luckiest Guy',cursive;font-size:14px;min-width:24px;text-align:right;color:var(--yellow);text-shadow:1px 1px 0 var(--ink)}

  /* ---------- total speech bubble ---------- */
  .total-bubble{position:relative;margin:22px auto 18px;max-width:320px;
    background:#fff;border:5px solid var(--ink);border-radius:26px;padding:14px 10px;text-align:center;
    box-shadow:6px 6px 0 var(--ink)}
  .total-bubble:after{content:"";position:absolute;left:40px;bottom:-26px;
    border:14px solid transparent;border-top-color:var(--ink);border-bottom:0}
  .total-bubble:before{content:"";position:absolute;left:44px;bottom:-16px;z-index:1;
    border:10px solid transparent;border-top-color:#fff;border-bottom:0}
  .total-bubble .lucky{font-size:30px;color:var(--red);display:block;line-height:1}
  .total-bubble small{font-family:'Bangers',cursive;font-size:15px;letter-spacing:1px;color:var(--ink)}

  .btn-submit{
    width:100%;font-family:'Bangers',cursive;font-size:30px;letter-spacing:1.5px;cursor:pointer;
    background:var(--red);color:#fff;border:5px solid var(--ink);padding:14px;border-radius:12px;
    text-shadow:2px 2px 0 var(--ink);box-shadow:7px 7px 0 var(--ink);
    transition:transform .05s,box-shadow .05s;
  }
  .btn-submit:active{transform:translate(7px,7px);box-shadow:0 0 0 var(--ink)}
  .btn-submit:disabled{background:#c9c4b4;color:#fff;cursor:not-allowed;box-shadow:7px 7px 0 #8a8676;text-shadow:none}

  /* ---------- leaderboard ---------- */
  ol.board{list-style:none;margin:6px 0 0;padding:0}
  li.row{
    display:flex;align-items:center;gap:14px;padding:12px;margin-bottom:12px;
    background:#fff;border:4px solid var(--ink);border-radius:10px;box-shadow:5px 5px 0 var(--ink);
    animation:popin .45s cubic-bezier(.2,1.5,.4,1) both;
  }
  @keyframes popin{0%{opacity:0;transform:scale(0) rotate(-8deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
  li.row .pos{font-family:'Luckiest Guy',cursive;font-size:26px;min-width:46px;text-align:center;
    color:var(--ink);text-shadow:2px 2px 0 var(--yellow)}
  .av{position:relative;width:60px;height:60px;flex:0 0 auto}
  .av .burst{position:absolute;inset:-14px;border-radius:50%;z-index:0;
    background:repeating-conic-gradient(from 0deg,var(--yellow) 0deg 12deg, var(--red) 12deg 24deg);
    animation:spin 12s linear infinite;
    -webkit-mask-image:radial-gradient(circle,#000 30%,transparent 72%);
            mask-image:radial-gradient(circle,#000 30%,transparent 72%)}
  .av img{position:relative;z-index:1;width:60px;height:60px;border-radius:50%;
    border:4px solid var(--ink);background:var(--cyan);display:block;filter:contrast(1.15) saturate(1.35)}
  li.row .who{flex:1;min-width:0}
  li.row .who .name{font-size:24px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  li.row .who .ate{font-size:14px;font-weight:600;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  li.row .cal{font-family:'Luckiest Guy',cursive;font-size:20px;color:#fff;white-space:nowrap;
    background:var(--red);border:3px solid var(--ink);border-radius:20px;padding:2px 12px;transform:rotate(3deg)}
  li.row.gold{background:var(--yellow)}
  li.row.silver{background:#e9e9ef}
  li.row.bronze{background:#f3cfa0}

  .status{font-size:16px;text-align:center;margin-top:12px;color:#8a8676;font-weight:700}
  .status.err{color:var(--red)}
  .footer{text-align:center;font-size:15px;color:#9a8f6f;padding:22px;font-weight:600}
  .footer code{color:var(--red)}

  /* ---------- POW toast ---------- */
  #toast{
    position:fixed;left:50%;top:38%;transform:translate(-50%,-50%) scale(0) rotate(-12deg);
    z-index:10000;pointer-events:none;
    font-family:'Bangers',cursive;font-size:clamp(34px,8vw,64px);letter-spacing:2px;color:var(--yellow);
    background:var(--red);border:6px solid var(--ink);padding:18px 34px;border-radius:14px;text-align:center;
    text-shadow:3px 3px 0 var(--ink);box-shadow:9px 9px 0 var(--ink);
    transition:transform .3s cubic-bezier(.2,1.6,.4,1);
  }
  #toast.show{transform:translate(-50%,-50%) scale(1) rotate(-6deg)}
</style>
</head>
<body>
<header>
  <div class="sunburst"></div>
  <div class="inner">
    <h1 class="title">McMAXX</h1>
    <div class="tag">★ MAXIMUM CALORIE ARENA ★ EAT TO WIN ★</div>
  </div>
</header>

<main>
  <!-- LEFT: entry -->
  <section class="panel">
    <span class="banner">NEW RUN!</span>

    <label class="fld" for="name">Player Tag</label>
    <input id="name" type="text" maxlength="16" placeholder="e.g. GREASE GOBLIN" autocomplete="off" />

    <div class="avatar-wrap">
      <div class="avatar-frame"><img id="avatar" alt="your avatar" /></div>
      <button class="reroll" id="reroll">RE-ROLL!</button>
    </div>

    <label class="fld">What did you destroy?</label>
    <div class="menu-grid" id="menu"></div>

    <div class="total-bubble">
      <span class="lucky" id="totalNum">0</span>
      <small>KCAL OF GLORY</small>
    </div>
    <button class="btn-submit" id="submit" disabled>SLAM IT!</button>
    <div class="status" id="entryStatus"></div>
  </section>

  <!-- RIGHT: leaderboard -->
  <section class="panel">
    <span class="banner">HALL OF GLUTTONY!</span>
    <ol class="board" id="board"></ol>
    <div class="status" id="boardStatus">loading…</div>
  </section>
</main>

<div class="footer">
  scores <span id="mode">saved locally</span> · avatars by dicebear · not affiliated with mcdonald's, obviously
</div>

<div id="toast"></div>

<script>
/* =========================================================================
   ⚙️  CONFIG — flip to SHARED cloud leaderboard here.
   -------------------------------------------------------------------------
   Out of the box this works SOLO (scores saved in your own browser).
   To make ONE shared leaderboard all your friends see:
     1. Make a free account at https://jsonbin.io
     2. Create a new bin. Paste this as its content and SAVE:
            { "entries": [] }
     3. Copy the BIN ID (in the bin's URL / "API" panel) into BIN_ID below.
     4. Account → API Keys → copy your X-MASTER-KEY into MASTER_KEY below.
     5. (Recommended) In the bin, set it to PRIVATE so only your key writes.
     6. Re-upload index.html. Done — everyone shares one board.
   ========================================================================= */
const CONFIG = {
  BIN_ID:     "",   // e.g. "66f0a1b2ac..."  ← leave "" for solo/local mode
  MASTER_KEY: "",   // e.g. "$2a$10$....."   ← your JSONBin X-Master-Key
};
/* ========================================================================= */

// ---- McDonald's menu (approx US kcal). Tweak freely. ----
const MENU = [
  ["🍔 Big Mac", 550],
  ["🧀 Quarter Pounder w/ Cheese", 520],
  ["🧀🧀 Double Quarter Pounder", 740],
  ["🍔 McDouble", 400],
  ["🍔 Cheeseburger", 300],
  ["🍔 Hamburger", 250],
  ["🐔 McChicken", 400],
  ["🐔 McCrispy", 470],
  ["🍗 McNuggets (10pc)", 410],
  ["🍗 McNuggets (6pc)", 250],
  ["🐟 Filet-O-Fish", 390],
  ["🍟 Fries (Small)", 230],
  ["🍟 Fries (Medium)", 340],
  ["🍟 Fries (Large)", 480],
  ["🥧 Apple Pie", 230],
  ["🍦 McFlurry Oreo", 510],
  ["🥤 Choc Shake (M)", 630],
  ["🍦 Hot Fudge Sundae", 330],
  ["🥤 Coca-Cola (M)", 200],
  ["🥤 Sprite (M)", 200],
  ["🫧 Diet Coke (M)", 0],
  ["🧇 Hotcakes", 580],
  ["🥚 Sausage McMuffin w/ Egg", 480],
  ["🥚 Egg McMuffin", 310],
  ["🥔 Hash Browns", 140],
];

// pop-art comic-style people avatars
const AV_STYLE = "open-peeps";
const avatarURL = seed =>
  `https://api.dicebear.com/9.x/${AV_STYLE}/svg?seed=${encodeURIComponent(seed)}`;

// ---------- state ----------
const cart = new Map();          // idx -> qty
let avatarSeed = randomSeed();
const $ = id => document.getElementById(id);
function randomSeed(){ return Math.random().toString(36).slice(2,10); }

// ---------- build menu ----------
function buildMenu(){
  const wrap = $("menu");
  MENU.forEach(([nm,kc],i)=>{
    const el = document.createElement("div");
    el.className = "item"; el.dataset.i = i;
    el.innerHTML = `<span class="nm">${nm}</span><span class="kc">${kc}</span><span class="qty"></span>`;
    el.addEventListener("click", ()=>addItem(i, el));
    el.addEventListener("contextmenu", e=>{e.preventDefault();removeItem(i, el);});
    wrap.appendChild(el);
  });
}
function addItem(i, el){ cart.set(i,(cart.get(i)||0)+1); refreshItem(i,el); recalc(); }
function removeItem(i, el){ const q=(cart.get(i)||0)-1; if(q<=0)cart.delete(i);else cart.set(i,q); refreshItem(i,el); recalc(); }
function refreshItem(i, el){ const q=cart.get(i)||0; el.classList.toggle("picked",q>0); el.querySelector(".qty").textContent=q>0?"x"+q:""; }
function totalCals(){ let t=0; cart.forEach((q,i)=>t+=MENU[i][1]*q); return t; }
function summary(){ const p=[]; cart.forEach((q,i)=>p.push((q>1?q+"× ":"")+MENU[i][0].replace(/^\S+\s/,""))); return p.join(", "); }
function recalc(){
  const t=totalCals();
  $("totalNum").textContent = t.toLocaleString();
  $("submit").disabled = !( $("name").value.trim() && t>0 );
}

// ---------- avatar ----------
function refreshAvatar(){
  const seed = ($("name").value.trim()||"anon")+"::"+avatarSeed;
  $("avatar").src = avatarURL(seed);
}

// ---------- storage layer ----------
const useCloud = !!(CONFIG.BIN_ID && CONFIG.MASTER_KEY);
const LS_KEY = "mcmaxx_entries_v1";
const binURL = CONFIG.BIN_ID ? `https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}` : "";

async function loadEntries(){
  if(!useCloud){ try{ return JSON.parse(localStorage.getItem(LS_KEY)||"[]"); }catch{ return []; } }
  const r = await fetch(binURL+"/latest",{headers:{"X-Master-Key":CONFIG.MASTER_KEY}});
  if(!r.ok) throw new Error("read "+r.status);
  const j = await r.json();
  return (j.record && j.record.entries) || [];
}
async function saveEntries(entries){
  if(!useCloud){ localStorage.setItem(LS_KEY,JSON.stringify(entries)); return; }
  const r = await fetch(binURL,{method:"PUT",
    headers:{"Content-Type":"application/json","X-Master-Key":CONFIG.MASTER_KEY},
    body:JSON.stringify({entries})});
  if(!r.ok) throw new Error("write "+r.status);
}

// ---------- leaderboard ----------
function renderBoard(entries){
  const board = $("board"); board.innerHTML="";
  const sorted = [...entries].sort((a,b)=>b.calories-a.calories).slice(0,25);
  const medal = ["gold","silver","bronze"];
  sorted.forEach((e,idx)=>{
    const li=document.createElement("li");
    li.className="row "+(medal[idx]||"");
    li.style.animationDelay=(idx*0.05)+"s";
    const pos = idx===0?"👑":(idx+1);
    const burst = idx===0?'<span class="burst"></span>':'';
    li.innerHTML=`
      <span class="pos">${pos}</span>
      <span class="av">${burst}<img src="${avatarURL(e.name+'::'+(e.seed||''))}" alt=""></span>
      <span class="who">
        <span class="name">${escapeHtml(e.name)}</span>
        <span class="ate">${escapeHtml(e.summary||'')}</span>
      </span>
      <span class="cal">${e.calories.toLocaleString()}</span>`;
    board.appendChild(li);
  });
  $("boardStatus").textContent = sorted.length? "" : "no gluttons yet — be the first!";
}
function escapeHtml(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

async function refreshBoard(){
  try{ renderBoard(await loadEntries()); }
  catch(err){ const s=$("boardStatus"); s.textContent="board error: "+err.message; s.classList.add("err"); }
}

// ---------- submit ----------
async function submit(){
  const name=$("name").value.trim(); const cals=totalCals();
  if(!name || cals<=0) return;
  const btn=$("submit"); btn.disabled=true; const old=btn.textContent; btn.textContent="UPLOADING…";
  try{
    const entries = await loadEntries();
    const entry={ name, seed:avatarSeed, calories:cals, summary:summary(), ts:Date.now() };
    const existing = entries.find(e=>e.name.toLowerCase()===name.toLowerCase());
    if(existing){ if(cals>existing.calories) Object.assign(existing,entry); } else entries.push(entry);
    await saveEntries(entries);
    renderBoard(entries);
    toast("POW! "+cals.toLocaleString()+"!");
    cart.clear();
    document.querySelectorAll(".item").forEach(el=>{el.classList.remove("picked");el.querySelector(".qty").textContent="";});
    recalc();
  }catch(err){ toast("FAIL: "+err.message); }
  finally{ btn.textContent=old; recalc(); }
}

// ---------- toast ----------
let toastT;
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2000); }

// ---------- init ----------
buildMenu(); refreshAvatar(); refreshBoard();
$("mode").textContent = useCloud ? "shared with your crew ☁️" : "saved locally (solo mode)";
$("name").addEventListener("input", ()=>{refreshAvatar();recalc();});
$("reroll").addEventListener("click", ()=>{avatarSeed=randomSeed();refreshAvatar();});
$("submit").addEventListener("click", submit);
if(useCloud) setInterval(refreshBoard, 20000);
</script>
</body>
</html>
